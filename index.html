<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AR Generation</title>
    <link rel="stylesheet" href="style.css">
    <script>
        // Immediately invoked function to set the theme on initial load, preventing FOUC
        (function() {
            try {
                const theme = localStorage.getItem('theme');
                if (theme === 'navy' || theme === 'gray') {
                    document.documentElement.classList.add('dark');
                }
            } catch (e) {
                console.error('Could not apply theme from localStorage', e);
            }
        })();
    </script>
</head>
<body class="overflow-x-hidden">
    <div id="app-container" class="flex h-screen bg-light-bg text-slate-800 font-sans">
        <aside id="sidebar" class="w-64">
            <div class="sidebar-content-wrapper">
                <div class="sidebar-header">
                    <button id="menu-toggle-button" class="menu-button">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                    <h1 id="menu-title" class="menu-title">Menu</h1>
                </div>

                <nav class="flex-grow">
                    <ul id="nav-list">
                        <li data-page="Home" class="nav-item group">
                            <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h7.5"></path>
                            </svg>
                            <span class="nav-text">Home</span>
                        </li>
                        <li data-page="Profile" class="nav-item group">
                           <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"></path>
                            </svg>
                            <span class="nav-text">Profile</span>
                        </li>
                        <li data-page="Apps" class="nav-item group">
                            <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 8.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6A2.25 2.25 0 0115.75 3.75h2.25A2.25 2.25 0 0120.25 6v2.25a2.25 2.25 0 01-2.25 2.25h-2.25A2.25 2.25 0 0113.5 8.25V6zM13.5 15.75A2.25 2.25 0 0115.75 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z"></path>
                            </svg>
                            <span class="nav-text">Apps</span>
                        </li>
                        <li data-page="Messages" class="nav-item group">
                            <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"></path>
                            </svg>
                            <span class="nav-text">Messages</span>
                        </li>
                        <li class="theme-switcher-container">
                            <button id="theme-toggle-button" class="nav-item group">
                                <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.098 19.902a3.75 3.75 0 005.304 0l6.401-6.402a3.75 3.75 0 00-5.304-5.304L4.098 14.6a3.75 3.75 0 000 5.304z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" />
                                </svg>
                                <span class="nav-text">Theme</span>
                            </button>
                            <div id="theme-options" class="theme-options-popup">
                                <button data-theme="default" class="theme-option-button">Default</button>
                                <button data-theme="navy" class="theme-option-button">Navy</button>
                                <button data-theme="gray" class="theme-option-button">Gray</button>
                            </div>
                        </li>
                    </ul>
                </nav>
            </div>
        </aside>

        <div id="main-content" class="main-content">
            <!-- Content will be injected by JavaScript -->
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
